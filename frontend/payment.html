<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment - TourEase</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <div class="nav-logo-icon">✈</div>
                Tour<span>Ease</span>
            </a>
            <div class="nav-actions" id="navActions"></div>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card" style="max-width: 520px;">
            <div style="text-align:center; margin-bottom: 24px;">
                <div style="font-size:2.5rem;">💳</div>
                <h2>Complete Payment</h2>
                <p>Demo Payment Gateway</p>
            </div>

            <div id="alertMsg" class="alert"></div>

            <div style="background:#f8fafc; padding:16px; border-radius:12px; margin-bottom:20px;">
                <h3 style="margin-bottom:10px;">Booking Summary</h3>
                <p><strong>Package:</strong> <span id="packageTitle">Tour Package</span></p>
                <p><strong>Persons:</strong> <span id="persons">1</span></p>
                <p><strong>Total Amount:</strong> <span id="totalPrice">₹0</span></p>
            </div>

            <form onsubmit="handlePayment(event)">
                <div class="form-group">
                    <label>Card Holder Name</label>
                    <input type="text" id="cardName" required placeholder="Enter card holder name" />
                </div>

                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" id="cardNumber" maxlength="16" required placeholder="1234 5678 9012 3456" />
                </div>

                <div class="form-group">
                    <label>Demo Payment PIN</label>
                    <input type="password" id="paymentPin" maxlength="4" required placeholder="Enter 4-digit PIN" />
                    <small style="color:#666;">Demo PIN: <strong>1234</strong></small>
                </div>

                <button type="submit" class="btn-primary btn-full" id="payBtn">
                    Pay Now
                </button>
            </form>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bookingData = JSON.parse(localStorage.getItem('pendingBooking'));

            if (!bookingData) {
                window.location.href = 'packages.html';
                return;
            }

            document.getElementById('packageTitle').textContent = bookingData.packageTitle || 'Tour Package';
            document.getElementById('persons').textContent = bookingData.persons || 1;
            document.getElementById('totalPrice').textContent = '₹' + Number(bookingData.totalPrice || 0).toLocaleString('en-IN');
        });

        async function handlePayment(e) {
            e.preventDefault();
            hideAlert('alertMsg');

            const pin = document.getElementById('paymentPin').value.trim();
            const btn = document.getElementById('payBtn');

            btn.disabled = true;
            btn.textContent = 'Processing Payment...';

            // Fake payment delay
            setTimeout(async () => {
                if (pin !== '1234') {
                    showError('alertMsg', 'Invalid Payment PIN. Use 1234 for demo.');
                    btn.disabled = false;
                    btn.textContent = 'Pay Now';
                    return;
                }

                try {
                    // Get saved booking data
                    const bookingData = JSON.parse(localStorage.getItem('pendingBooking'));

                    if (!bookingData) {
                        showError('alertMsg', 'Booking data not found.');
                        btn.disabled = false;
                        btn.textContent = 'Pay Now';
                        return;
                    }

                    // REAL backend API call here
                    await apiRequest('/bookings', 'POST', {
                        packageId: bookingData.packageId,
                        name: bookingData.name,
                        email: bookingData.email,
                        phone: bookingData.phone,
                        persons: bookingData.persons,
                        date: bookingData.date
                    });

                    // Save local success state
                    bookingData.status = 'confirmed';
                    bookingData.paymentStatus = 'paid';
                    bookingData.paymentDate = new Date().toISOString();

                    localStorage.setItem(
                        'lastBookingSuccess',
                        JSON.stringify(bookingData)
                    );

                    localStorage.removeItem('pendingBooking');

                    // Success UI
                    document.querySelector('.auth-card').innerHTML = `
        <div style="text-align:center; padding:20px;">
          <div style="font-size:4rem; margin-bottom:16px;">✅</div>
          <h2>Payment Successful!</h2>
          <p>Your booking has been confirmed successfully.</p>
          <p style="margin-top:10px;">
            <strong>Redirecting to My Bookings...</strong>
          </p>
        </div>
      `;

                    setTimeout(() => {
                        window.location.href = 'my-bookings.html';
                    }, 2000);

                } catch (err) {
                    showError('alertMsg', err.message || 'Booking failed');
                    btn.disabled = false;
                    btn.textContent = 'Pay Now';
                }

            }, 1500);
        }
    </script>

</body>

</html>
