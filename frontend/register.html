<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – TourEase</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">✈</div>
      Tour<span>Ease</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="packages.html">Packages</a></li>
    </ul>
    <div class="nav-actions" id="navActions"></div>
  </div>
</nav>

<!-- REGISTER FORM -->
<div class="auth-page">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:28px;">
      <div style="font-size:2.5rem; margin-bottom:12px;">🌍</div>
      <h2>Create Account</h2>
      <p>Join TourEase and start exploring</p>
    </div>

    <div id="alertMsg" class="alert"></div>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Your full name" required />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Minimum 6 characters" required minlength="6" />
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter your password" required />
      </div>
      <button type="submit" id="submitBtn" class="btn-primary btn-full" style="margin-top:8px;">
        Create Account
      </button>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>
</div>

<script src="js/utils.js"></script>
<script>
  // Redirect if already logged in
  if (isLoggedIn()) {
    window.location.href = 'index.html';
  }

  async function handleRegister(e) {
    e.preventDefault();
    hideAlert('alertMsg');

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('submitBtn');

    // Client-side validation
    if (!name || !email || !password) {
      showError('alertMsg', 'Please fill all fields');
      return;
    }

    if (password !== confirmPassword) {
      showError('alertMsg', 'Passwords do not match');
      return;
    }

    if (password.length < 6) {
      showError('alertMsg', 'Password must be at least 6 characters');
      return;
    }

    // Disable button while loading
    btn.textContent = 'Creating account...';
    btn.disabled = true;

    try {
      const data = await apiRequest('/users/register', 'POST', { name, email, password });
      saveAuth(data); // Auto-login after registration

      showSuccess('alertMsg', 'Account created successfully! Redirecting...');

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);

    } catch (err) {
      showError('alertMsg', err.message);
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
